version: '3.8'

services:
  rag-assistant:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_legal_assistant
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=YOUR_GEMINI_API_KEY_HERE
    volumes:
      - rag_data:/app/data
    restart: always

volumes:
  rag_data:
    driver: local
